<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger UI - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; }
        .messenger-blue { color: #0084ff; }
        .bg-messenger-blue { background-color: #0084ff; }
        .bg-dark-pill { background-color: #242526; }
        #chat-area::-webkit-scrollbar { width: 0px; }
        .bubble { max-width: 65%; word-wrap: break-word; line-height: 1.35; font-size: 13px; position: relative; }
        .img-bubble { max-width: 60%; border-radius: 18px; overflow: visible; margin-top: 4px; position: relative; display: inline-block; }
        .img-bubble img { border-radius: 18px; display: block; }
        
        .timestamp {
            font-size: 11px;
            color: #8e8e93;
            text-align: center;
            margin: 16px 0;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .action-btn { 
            display: none; 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            padding: 4px;
            color: #65676b;
            z-index: 5;
            transition: all 0.2s;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); color: white; }
        .message-row:hover .action-btn, .timestamp-row:hover .action-btn { display: block; }
        
        .left-row .delete-btn { right: -35px; }
        .left-row .insert-btn { right: -65px; }
        .right-row .delete-btn { left: -35px; }
        .right-row .insert-btn { left: -65px; }
        .timestamp-row .delete-btn { right: 10px; }
        .timestamp-row .insert-btn { right: 40px; }

        .insert-active { border: 1px dashed #0084ff; border-radius: 10px; background: rgba(0, 132, 255, 0.05); }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="h-screen flex flex-col max-w-md mx-auto border-x border-gray-900 bg-black relative">

    <header class="px-3 py-2 flex items-center justify-between bg-black sticky top-0 z-20">
        <div class="flex items-center space-x-4">
            <svg viewBox="0 0 24 24" class="h-6 w-6 messenger-blue" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            <div class="relative w-9 h-9">
                <img id="header-profile-img" src="https://ui-avatars.com/api/?name=Sia&background=random" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 id="header-name" class="font-bold text-[17px] tracking-tight">Sia</h2>
        </div>
        <div class="flex items-center space-x-5">
            <svg viewBox="0 0 24 24" class="h-6 w-6 bg-messenger-blue rounded-[4px] p-0.5 text-black" fill="currentColor">
                <path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 8.25c-.97 0-1.75-.78-1.75-1.75s.78-1.75 1.75-1.75 1.75.78 1.75 1.75-.78 1.75-1.75 1.75z"/>
            </svg>
            <svg viewBox="0 0 24 24" class="h-7 w-7 messenger-blue" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
        </div>
    </header>

    <main id="chat-area" class="flex-1 overflow-y-auto p-3 space-y-4 pb-24">
    </main>

    <footer class="bg-black px-3 py-3 pb-8 flex items-center space-x-3 border-t border-gray-900 sticky bottom-0 z-10">
        <div class="flex items-center space-x-3.5 messenger-blue">
            <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm10.67 1.47l-1.25-1.56A2.01 2.01 0 0019.89 8H17l-1.71-2.04A2.01 2.01 0 0013.75 5h-3.5c-.56 0-1.1.23-1.5.61l-2.04 2.39H4c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-6.67c0-.56-.23-1.1-.61-1.47zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
            <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <svg viewBox="0 0 24 24" class="h-6 w-6" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
        </div>

        <div class="flex-1 bg-dark-pill rounded-full px-4 py-2 flex items-center">
            <span class="text-gray-400 text-[15.5px] flex-1">Message</span>
            <svg viewBox="0 0 24 24" class="h-6 w-6 messenger-blue" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8-3.58 8-8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5s.67 1.5 1.5 1.5zm.5 3c.67 1.2 1.91 2 3.5 2s2.83-.8 3.5-2h-7z"/></svg>
        </div>

        <div onclick="toggleAdmin( )" class="messenger-blue cursor-pointer active:scale-90 transition-transform no-print">
            <svg viewBox="0 0 24 24" class="h-[28px] w-[28px]" fill="currentColor">
                <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.75 0 1.41-.41 1.75-1.03l3.12-7.29c.08-.19.13-.4.13-.68V10z"/>
            </svg>
        </div>
    </footer>

    <div id="admin-panel" class="no-print fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1c1c1e] p-5 border-t-2 border-blue-600 rounded-t-2xl z-30 transform translate-y-full transition-transform duration-300 overflow-y-auto max-h-[50vh]">
        <div class="flex justify-between items-center mb-4">
            <div>
                <span id="panel-title" class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Editor Panel</span>
                <p id="insert-notice" class="text-[9px] text-yellow-500 hidden">Inserting Above Selected Row</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="cancelInsert()" id="cancel-insert-btn" class="text-[10px] bg-red-900/40 px-3 py-1 rounded-full text-red-400 hidden">Cancel Insert</button>
                <button onclick="toggleAdmin()" class="text-[10px] bg-gray-700 px-3 py-1 rounded-full text-white">Hide</button>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="name-input" placeholder="Change Name" class="bg-black text-xs p-2.5 rounded-lg border border-gray-800 outline-none">
            <select id="side-select" class="bg-black text-xs p-2.5 rounded-lg border border-gray-800 outline-none">
                <option value="left">Left (Incoming)</option>
                <option value="right">Right (Outgoing)</option>
                <option value="timestamp">Timestamp (Auto Time)</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="file" id="profile-input" accept="image/*" class="text-[10px] text-gray-400">
            <input type="file" id="chat-image-input" accept="image/*" class="text-[10px] text-gray-400">
        </div>

        <textarea id="text-input" placeholder="Type message..." rows="2" class="w-full bg-black text-sm p-3 rounded-lg border border-gray-800 outline-none mb-4"></textarea>
        <button id="add-btn" onclick="addMessage()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm">Add Item</button>
    </div>

    <script>
        let selectedChatImage = null;
        let insertTarget = null; 

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('translate-y-full');
        }

        function getCurrentTimestamp() {
            const now = new Date();
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            const minutes = now.getMinutes().toString().padStart(2, '0');
            return hours + ":" + minutes + " " + ampm;
        }

        function setInsertMode(element) {
            if (insertTarget) insertTarget.classList.remove('insert-active');
            insertTarget = element;
            insertTarget.classList.add('insert-active');
            
            document.getElementById('add-btn').innerText = "Insert Above Selected";
            document.getElementById('add-btn').classList.replace('bg-blue-600', 'bg-yellow-600');
            document.getElementById('insert-notice').classList.remove('hidden');
            document.getElementById('cancel-insert-btn').classList.remove('hidden');
            
            const panel = document.getElementById('admin-panel');
            if (panel.classList.contains('translate-y-full')) toggleAdmin();
            document.getElementById('text-input').focus();
        }

        function cancelInsert() {
            if (insertTarget) insertTarget.classList.remove('insert-active');
            insertTarget = null;
            document.getElementById('add-btn').innerText = "Add Item";
            document.getElementById('add-btn').classList.replace('bg-yellow-600', 'bg-blue-600');
            document.getElementById('insert-notice').classList.add('hidden');
            document.getElementById('cancel-insert-btn').classList.add('hidden');
        }

        document.getElementById('profile-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newImageUrl = event.target.result;
                    
                    document.getElementById('header-profile-img').src = newImageUrl;

                    const chatAvatars = document.querySelectorAll('#chat-area .chat-avatar');
                    chatAvatars.forEach(avatar => {
                        avatar.src = newImageUrl;
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('chat-image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => selectedChatImage = e.target.result;
                reader.readAsDataURL(file);
            }
        });

        function addMessage() {
            const textInput = document.getElementById('text-input');
            const side = document.getElementById('side-select').value;
            const chatArea = document.getElementById('chat-area');
            const nameInput = document.getElementById('name-input');
            const currentImg = document.getElementById('header-profile-img').src;

            if (nameInput.value) document.getElementById('header-name').innerText = nameInput.value;
            if (side !== 'timestamp' && textInput.value.trim() === "" && !selectedChatImage) return;

            const row = document.createElement('div');
            row.className = 'item-row relative w-full group';

            const actions = `
                <div onclick="this.closest('.item-row').remove()" class="action-btn delete-btn no-print" title="Delete">
                    <svg viewBox="0 0 24 24" class="w-4 h-4" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </div>
                <div onclick="setInsertMode(this.closest('.item-row'))" class="action-btn insert-btn no-print" title="Insert Above">
                    <svg viewBox="0 0 24 24" class="w-4 h-4" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </div>
            `;

            if (side === 'timestamp') {
                row.classList.add('timestamp-row', 'flex', 'justify-center');
                row.innerHTML = `<div class="timestamp">${getCurrentTimestamp()}</div>` + actions;
            } else {
                row.classList.add('message-row', 'flex', 'items-end');
                let content = '';
                if (selectedChatImage) {
                    content = `<div class="img-bubble relative">${actions}<img src="${selectedChatImage}" class="w-full h-auto"></div>`;
                } else {
                    const bgColor = side === 'left' ? 'bg-dark-pill' : 'bg-messenger-blue';
                    const roundClass = side === 'left' ? 'rounded-bl-none' : 'rounded-br-none';
                    content = `<div class="${bgColor} text-white p-2.5 rounded-[18px] ${roundClass} bubble relative">${textInput.value.replace(/\n/g, '<br>')}${actions}</div>`;
                }

                if (side === 'left') {
                    row.classList.add('left-row', 'justify-start', 'space-x-2');
                    row.innerHTML = `<div class="w-7 h-7 bg-gray-800 rounded-full flex-shrink-0 overflow-hidden"><img src="${currentImg}" class="w-full h-full object-cover chat-avatar"></div>` + content;
                } else {
                    row.classList.add('right-row', 'justify-end');
                    row.innerHTML = content;
                }
            }

            if (insertTarget) {
                chatArea.insertBefore(row, insertTarget);
                cancelInsert();
            } else {
                chatArea.appendChild(row);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            textInput.value = "";
            selectedChatImage = null;
            document.getElementById('chat-image-input').value = "";
        }
    </script>
</body>
</html>
